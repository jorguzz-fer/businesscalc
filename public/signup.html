<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Criar conta — BusinessCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/auth.css?v=2">
</head>
<body>
  <div class="auth-card">
    <h1 class="auth-logo">Business<span>Calc</span></h1>
    <p class="auth-subtitle">Crie sua conta gratuita</p>

    <div id="alert" class="alert hidden"></div>

    <form id="form" class="form" novalidate>
      <div class="field">
        <label for="name">Nome (opcional)</label>
        <input type="text" id="name" name="name" autocomplete="name" maxlength="100">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="12">
        <div class="strength-meter"><div id="strength-fill" class="strength-meter-fill"></div></div>
        <div id="strength-label" class="strength-label">Mínimo 12 caracteres</div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">Li e aceito os <a href="/terms.html" target="_blank">Termos</a> e a <a href="/privacy.html" target="_blank">Política de Privacidade</a>.</label>
      </div>
      <button type="submit" class="btn btn-primary" id="submit">Criar conta</button>
    </form>

    <div class="auth-links">
      <span>Já tem conta?</span>
      <a href="/login.html">Entrar</a>
    </div>
  </div>

  <script src="/assets/auth.js?v=2"></script>
  <script>
    const form = document.getElementById('form');
    const submit = document.getElementById('submit');
    const alert = document.getElementById('alert');

    window.bindPasswordToggle(document.getElementById('password'));
    window.bindStrengthMeter(
      document.getElementById('password'),
      document.getElementById('strength-fill'),
      document.getElementById('strength-label'),
    );

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      alert.classList.add('hidden');
      submit.disabled = true;
      submit.textContent = 'Criando...';
      try {
        const nameVal = document.getElementById('name').value.trim();
        const body = {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          termsAccepted: document.getElementById('terms').checked,
        };
        if (nameVal) body.name = nameVal;
        const data = await window.api('POST', '/api/auth/signup', body);
        alert.className = 'alert alert-success';
        alert.textContent = data.message || 'Conta criada. Verifique seu email.';
        alert.classList.remove('hidden');
        form.querySelectorAll('input, button').forEach(function (el) { el.disabled = true; });
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message || 'Erro ao criar conta';
        alert.classList.remove('hidden');
        submit.disabled = false;
        submit.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
